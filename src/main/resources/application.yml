spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: oldercare
  
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/oldercare}
    username: ${SUPABASE_DB_USERNAME:${DB_USERNAME:postgres}}
    password: ${SUPABASE_DB_PASSWORD:${DB_PASSWORD:password}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always

logging:
  level:
    root: INFO
    com.oldercare: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-in-production-minimum-256-bits-long}
  expiration: 2592000000

qrcode:
  size: 300
  format: PNG

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080}
