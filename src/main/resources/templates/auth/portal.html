<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choisir l'acc&egrave;s</title>
  <link rel="stylesheet" href="/css/style.css?v=video-logo-color-1">
  <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
</head>
<body class="has-emergency-rail">
<div th:replace="~{fragments/emergency-rail :: emergencyRail}"></div>
<main class="app-shell">
  <div class="topbar">
    <a class="icon-button" href="/auth/logout">&larr;</a>
      <strong class="brand brand-with-video"><img class="brand-logo-img" src="/images/oldercare-mark.png" alt="OlderCare"></strong>
    <div class="bracelet-status-pill"><span></span> Bracelet connect&eacute;</div>
  </div>

  <section class="content portal-access-page">
        <img class="brand-wordmark brand-logo-wordmark" src="/images/oldercare-mark.png" alt="OlderCare">
    <h1 class="title-lg">Choisir le<br>type d'acc&egrave;s</h1>
    <p class="subtitle">S&eacute;lectionnez qui utilise ce code bracelet.</p>

    <div class="portal-choice-grid">
      <form method="post" action="/auth/portal/staff" class="portal-choice-form">
        <button class="portal-card portal-action-card" type="submit">
          <span class="portal-icon">&#9877;</span>
          <h2>Personnel m&eacute;dical</h2>
          <p>Vue d'urgence en lecture seule avec option de d&eacute;verrouillage m&eacute;dical.</p>
        </button>
      </form>

      <form method="post" action="/auth/portal/patient" class="portal-choice-form">
        <button class="portal-card portal-action-card" type="submit">
          <span class="portal-icon">&#128100;</span>
          <h2>Patient</h2>
          <p>Ouvrir le tableau de bord patient complet.</p>
        </button>
      </form>

      <form method="post" action="/auth/portal/autre" class="portal-choice-form">
        <button class="portal-card portal-action-card secondary" type="submit">
          <span class="portal-icon">&#128712;</span>
          <h2>Autre</h2>
          <p>Ouvrir uniquement les informations d'urgence.</p>
        </button>
      </form>
    </div>
  </section>
</main>
<section class="bracelet-success-overlay" th:if="${param.bracelet != null}" data-bracelet-success>
  <article class="bracelet-success-modal">
    <div class="bracelet-confetti one">+</div>
    <div class="bracelet-confetti two">+</div>
    <div class="bracelet-check-ring">
      <span>&#10003;</span>
    </div>
    <h2>Bracelet connect&eacute;<br><strong>avec succ&egrave;s</strong></h2>
    <div class="bracelet-success-line"><span></span></div>
    <p>Votre bracelet a &eacute;t&eacute; connect&eacute; avec succ&egrave;s.</p>
    <button type="button" class="bracelet-modal-button" data-close-bracelet>Continuer</button>
  </article>
</section>
<script>
  (() => {
    const overlay = document.querySelector('[data-bracelet-success]');
    if (!overlay) {
      return;
    }
    const close = () => overlay.classList.add('is-hidden');
    overlay.querySelector('[data-close-bracelet]')?.addEventListener('click', close);
    overlay.addEventListener('click', (event) => {
      if (event.target === overlay) {
        close();
      }
    });
    setTimeout(close, 4200);
  })();
</script>
</body>
</html>
