<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Une erreur est survenue</title>
  <link rel="stylesheet" href="/css/style.css?v=video-logo-color-1">
  <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
</head>
<body>
<main class="app-shell">
  <div class="topbar">
    <strong class="brand brand-with-video"><img class="brand-logo-img" src="/images/oldercare-logo-transparent.gif" alt="OlderCare"></strong>
    <a class="tiny" href="/auth/welcome">Accueil</a>
  </div>
  <section class="content">
    <h1 class="title-lg">Une erreur est<br>survenue</h1>
    <p class="subtitle">La demande n'a pas pu aboutir. Revenez en arri&egrave;re et r&eacute;essayez.</p>
    <div class="notice">
      <strong>Statut :</strong> <span th:text="${status}">500</span><br>
      <span th:text="${message}">Erreur inattendue</span>
    </div>
    <a class="primary-btn mt" href="/auth/welcome" style="display:grid;place-items:center">RETOUR AU D&Eacute;BUT</a>
  </section>
</main>
</body>
</html>
