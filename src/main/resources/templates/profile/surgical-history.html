<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Ant&eacute;c&eacute;dents chirurgicaux</title><link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/favicon.png}"></head>
<body><main class="app-shell">
  <div class="topbar"><button class="icon-button" onclick="history.back()">&larr;</button><strong>Profil de sant&eacute;</strong><button class="icon-button">&#8984;</button></div>
  <section class="content">
    <h1 class="title-lg">Ant&eacute;c&eacute;dents chirurgicaux</h1><p class="subtitle">Avez-vous subi l'une des interventions suivantes ?</p>
    <form id="surgery" class="form-stack">
      <input type="hidden" name="chronicConditions" th:value="${history.chronicConditions}">
      <input type="hidden" name="obGynHistory" th:value="${history.obGynHistory}">
      <input type="hidden" name="surgicalProcedures" id="surgicalProcedures">
      <div class="section-label">&#9635; G&eacute;n&eacute;ral</div>
      <div class="choice-list"><label class="choice">Appendicectomie <input name="proc" value="Appendicectomie" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Appendicectomie')}"></label><label class="choice">Chol&eacute;cystectomie <input name="proc" value="Chol&eacute;cystectomie" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Chol&eacute;cystectomie')}"></label><label class="choice">R&eacute;paration de hernie <input name="proc" value="R&eacute;paration de hernie" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'R&eacute;paration de hernie')}"></label></div>
      <div class="section-label">&#9637; Orthop&eacute;dique</div>
      <div class="choice-list"><label class="choice">Proth&egrave;se du genou <input name="proc" value="Proth&egrave;se du genou" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Proth&egrave;se du genou')}"></label><label class="choice">Proth&egrave;se de hanche <input name="proc" value="Proth&egrave;se de hanche" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Proth&egrave;se de hanche')}"></label><label class="choice">Arthrod&egrave;se vert&eacute;brale <input name="proc" value="Arthrod&egrave;se vert&eacute;brale" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Arthrod&egrave;se vert&eacute;brale')}"></label></div>
      <div class="section-label">&#9829; Cardiaque</div>
      <div class="choice-list"><label class="choice">Pontage cardiaque <input name="proc" value="Pontage cardiaque" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Pontage cardiaque')}"></label><label class="choice">Pose de stent <input name="proc" value="Pose de stent" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Pose de stent')}"></label><label class="choice">Pacemaker <input name="proc" value="Pacemaker" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Pacemaker')}"></label></div>
      <div class="section-label">&#9738; ORL</div>
      <div class="choice-list"><label class="choice">Amygdalectomie <input name="proc" value="Amygdalectomie" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Amygdalectomie')}"></label><label class="choice">Ad&eacute;no&iuml;dectomie <input name="proc" value="Ad&eacute;no&iuml;dectomie" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Ad&eacute;no&iuml;dectomie')}"></label></div>
      <div class="section-label">&bull;&bull;&bull; Autre</div>
      <div class="choice-list"><label class="choice">Chirurgie de la cataracte <input name="proc" value="Chirurgie de la cataracte" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'Chirurgie de la cataracte')}"></label><label class="choice">C&eacute;sarienne <input name="proc" value="C&eacute;sarienne" type="checkbox" th:checked="${history.surgicalProcedures != null && #strings.contains(history.surgicalProcedures, 'C&eacute;sarienne')}"></label></div>
      <div class="field"><label>Proc&eacute;dures ou notes suppl&eacute;mentaires</label><textarea id="surgicalNotes" th:text="${history.surgicalProcedures}" placeholder="Ajoutez les interventions non list&eacute;es ci-dessus..."></textarea></div>
    </form>
  </section>
  <div class="bottom-actions"><button class="save-btn" data-draft="surgery">&#9635;<span>ENREGISTRER</span></button><button class="primary-btn" form="surgery">CONTINUER &rarr;</button></div>
</main><script th:src="@{/js/main.js}"></script><script>surgery.addEventListener('submit', e => { e.preventDefault(); const checked = collectCheckedValues('input[name=proc]'); const notes = surgicalNotes.value.trim(); const merged = notes ? [notes] : []; checked.forEach(item => { if (!merged.some(existing => existing.toLowerCase().includes(item.toLowerCase()))) merged.push(item); }); surgicalProcedures.value = merged.join(', '); postForm('/profile/medical-history', new FormData(surgery), '/profile/setup?step=5'); });</script></body></html>
